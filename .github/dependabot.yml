version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    rebase-strategy: auto
    commit-message:
      prefix: deps
    groups:
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: deps
    groups:
      container-images:
        patterns:
          - "*"
